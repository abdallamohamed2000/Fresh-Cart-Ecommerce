<section class="w-75 mx-auto bg-main-light p-3 rounded-3 my-2" *ngIf="cartDetails;else msg">


    <div class="d-flex justify-content-between align-items-center">
        <h1>Shop Cart</h1>
        <button (click)="clear()" class="btn btn-sm btn-outline-danger">Clear Cart</button>
    </div>



    <p class="text-main">
        Total Price : {{ cartDetails.totalCartPrice | currency:'EUR' }}
    </p>
    <div class="row border-bottom py-2" *ngFor="let item of cartDetails.products">


        <div class="col-md-1">

            <img [src]="item.product.imageCover" class="w-100" alt="">
        </div>


        <div class="col-md-11">
            <div class="d-flex justify-content-between align-items-center">

                <!-- details -->
                <div>
                    <h3 class="h5">{{ item.product.title }}</h3>
                    <p class="text-main m-0"> Price : {{ item.price }}</p>
                    <button #btnRemove (click)="removeCartItem(item.product._id,btnRemove)" class="btn p-0 m-0 text-main"><i class="fa-regular fa-trash-can"></i> Remove</button>
                </div>

                <!-- buttns -->
                <div>
                    <button #btn1 (click)="changeCount(item.product._id,item.count+1,btn1,btn2)" class="btn border border-success ">+</button>
                    <span> {{ item.count }} </span>
                    <button #btn2 (click)="changeCount(item.product._id,item.count-1,btn1,btn2)" class="btn border border-success">-</button>

                </div>
            </div>

        </div>
    </div>
    <button [routerLink]="['/payment',cartDetails._id]" class="main-btn my-2">onlinePayment <img src="./assets/images/visa-1.svg" alt="visa"></button>
</section>

<!-- [routerLink]="['/checkout', cartDetails._id]" -->


<ng-template #msg>
    <h2 class="text-center ">Your Cart Is Empty...</h2>
</ng-template>
