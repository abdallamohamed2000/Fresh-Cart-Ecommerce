<section class="w-75 mx-auto rounded shadow bg-main-light p-3" *ngIf="productDetails">
    <div class="row align-items-center">
        <div class="col-md-3">
            <owl-carousel-o [options]="productSlider">

                <ng-container *ngFor="let src of productDetails.images">
                    <ng-template carouselSlide>
                        <img [src]="src" class="w-100">
                    </ng-template>
                </ng-container>

            </owl-carousel-o>
        </div>
        <div class="col-md-9">
            <div>
                <h3 class="h5">{{ productDetails.title }}</h3>
                <p class="text-muted">{{ productDetails.description }}</p>
                <h4 class="h6 text-main">{{ productDetails.category.name }}</h4>
                <div class="d-flex align-items-center justify-content-between">
                    <span>{{ productDetails.price }} EGP</span>
                    <div>
                        <i class="fas fa-star rating-color"></i>
                        <span class="text-muted">{{ productDetails.ratingsAverage }}</span>
                    </div>
                </div>
                <button (click)="addCart(productDetails._id,btnAdd)" #btnAdd class="main-btn w-100">Add Product</button>

            </div>
        </div>

    </div>
</section>
